<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카드 매칭 데모</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>카드 매칭 데모</h1>

  <!-- 참가자 입력 -->
  <div class="input-row">
    <input id="participant-input" type="text" placeholder="참가자 이름 입력">
    <button onclick="addParticipant()">참가자 추가</button>
  </div>
  <div id="participants-container" class="list-row"></div>

  <!-- 항목 입력 -->
  <div class="input-row">
    <input id="item-input" type="text" placeholder="항목 입력">
    <input id="item-count" type="number" min="1" value="1">
    <button onclick="addItem()">항목 추가</button>
  </div>
  <div id="items-container" class="list-row"></div>

  <!-- 컨트롤 버튼 -->
  <div class="control-row">
    <button onclick="resetAll()">전체 리셋</button>
    <button onclick="shuffleAndMatch()">카드 실행</button>
  </div>

  <!-- 카드 영역 -->
  <div id="cards-container" class="cards-row"></div>

  <!-- 결과 표 -->
  <h2>결과</h2>
  <table id="result-table">
    <thead>
      <tr><th>참가자</th><th>항목</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
